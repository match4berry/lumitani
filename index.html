<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LumiTani - Marketplace Petani Organik</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main App Container -->
    <div id="app" class="app-container">
        <!-- Dynamic content will be rendered here -->
    </div>

    <!-- Bottom Navigation (Fixed) -->
    <nav id="bottom-nav" class="bottom-nav">
        <a href="#/" class="nav-item" data-page="home">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span class="nav-label">Beranda</span>
        </a>
        <a href="#/catalog/all" class="nav-item" data-page="catalog">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"/>
                <rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/>
                <rect x="3" y="14" width="7" height="7"/>
            </svg>
            <span class="nav-label">Katalog</span>
        </a>
        <a href="#/cart" class="nav-item" data-page="cart">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="9" cy="21" r="1"/>
                <circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            <span class="nav-label">Keranjang</span>
            <span id="cart-badge" class="cart-badge" style="display: none;">0</span>
        </a>
        <a href="#/profile" class="nav-item" data-page="profile">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            <span class="nav-label">Profil</span>
        </a>
    </nav>

    <!-- Sidebar (Hidden by default) -->
    <div id="sidebar-overlay" class="sidebar-overlay">
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <img src="https://via.placeholder.com/120x40/22c55e/ffffff?text=LumiTani" alt="LumiTani" class="sidebar-logo">
                <button id="close-sidebar" class="close-sidebar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="sidebar-content">
                <a href="#/" class="sidebar-link">🏠 Beranda</a>
                <a href="#/catalog/all" class="sidebar-link">📦 Semua Produk</a>
                <a href="#/categories" class="sidebar-link">🗂️ Kategori</a>
                <a href="#/about" class="sidebar-link">ℹ️ Tentang Kami</a>
                <a href="#/contact" class="sidebar-link">📞 Kontak</a>
            </div>
        </nav>
    </div>

    <!-- Loading Spinner -->
    <div id="loading" class="loading-spinner" style="display: none;">
        <div class="spinner"></div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
